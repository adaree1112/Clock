<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }

body {
background: #0a0a0a;
overflow: hidden;
font-family: ‘Bebas Neue’, sans-serif;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
background-size: 60px 60px;
pointer-events: none;
z-index: 0;
}

.h-line {
position: fixed;
left: 0; right: 0; top: 50%;
height: 1px;
background: rgba(255,255,255,0.07);
z-index: 1;
}
.v-line {
position: fixed;
top: 0; bottom: 50%; left: 50%;
width: 1px;
background: rgba(255,255,255,0.07);
z-index: 1;
}

.blob {
position: fixed;
border-radius: 50%;
filter: blur(100px);
opacity: 0.07;
pointer-events: none;
z-index: 0;
}
.blob-green  { width: 40vw; height: 40vw; background: #39e86e; top: -10vw; left: -10vw; }
.blob-red    { width: 40vw; height: 40vw; background: #e83939; top: -10vw; right: -10vw; }
.blob-yellow { width: 60vw; height: 30vw; background: #f0d000; bottom: -5vw; left: 50%; transform: translateX(-50%); }

/* Quadrant containers — strictly clipped to their area */
.corner {
position: fixed;
z-index: 2;
overflow: hidden;
display: flex;
flex-direction: column;
padding: 3vmin;
}

#start-corner {
top: 0; left: 0;
width: 50%; height: 50%;
color: #39e86e;
text-shadow: 0 0 40px rgba(57,232,110,0.35);
align-items: flex-start;
justify-content: flex-end;
}

#end-corner {
top: 0; right: 0;
width: 50%; height: 50%;
color: #e83939;
text-shadow: 0 0 40px rgba(232,57,57,0.35);
align-items: flex-end;
justify-content: flex-end;
}

#now-corner {
bottom: 0; left: 0;
width: 100%; height: 50%;
color: #f0d000;
text-shadow: 0 0 40px rgba(240,208,0,0.35);
align-items: center;
justify-content: center;
}

.label {
font-size: clamp(0.6rem, 4vmin, 2rem);
letter-spacing: 0.3em;
text-transform: uppercase;
opacity: 0.55;
line-height: 1;
margin-bottom: 0.2em;
flex-shrink: 0;
}

/*
HH:MM = 5 chars in Share Tech Mono.
Each quadrant is 50vw wide with 3vmin padding each side = ~50vw - 6vmin available.
Height per quadrant = 50vh - 6vmin padding - label height.
We want the time to fill as much of the quadrant as possible.
Use container queries via JS to set the right size, OR use a safe
CSS value: the limiting dimension for a 5-char mono string in a 50vw box.

```
Share Tech Mono ch ≈ 0.6em, so 5ch ≈ 3em wide.
Available width = 50vw - 6vmin → font = (50vw - 6vmin) / 3
Available height = 50vh - 6vmin - label ≈ 50vh - 14vmin
Take the min of both constraints.
```

*/
.time-display {
font-family: ‘Share Tech Mono’, monospace;
/* width constraint: quadrant is 50vw, 5 chars × ~0.6 ch ratio */
–fw: calc((50vw - 6vmin) / 3);
/* height constraint: quadrant is 50vh minus padding and label */
–fh: calc(50vh - 14vmin);
font-size: min(var(–fw), var(–fh));
line-height: 1;
cursor: pointer;
transition: opacity 0.15s;
position: relative;
display: inline-block;
white-space: nowrap;
flex-shrink: 0;
}

.time-display:hover { opacity: 0.7; }

.time-display::after {
content: ‘✎’;
font-family: sans-serif;
font-size: 0.2em;
position: absolute;
top: 0.1em;
right: -1.5em;
opacity: 0;
transition: opacity 0.2s;
}
.time-display:hover::after { opacity: 0.45; }

.time-input {
font-family: ‘Share Tech Mono’, monospace;
–fw: calc((50vw - 6vmin) / 3);
–fh: calc(50vh - 14vmin);
font-size: min(var(–fw), var(–fh));
line-height: 1;
background: transparent;
border: none;
border-bottom: 0.04em solid currentColor;
outline: none;
width: 5ch;
padding: 0;
caret-color: currentColor;
color: inherit;
flex-shrink: 0;
}

/*
NOW spans full width (100vw) and HH:MM:SS = 8 chars.
Width constraint: (100vw - 6vmin) / (8 × 0.6) ≈ (100vw - 6vmin) / 4.8
Height constraint: 50vh - 14vmin
*/
#now-corner .time-display {
–fw: calc((100vw - 6vmin) / 4.8);
–fh: calc(50vh - 14vmin);
font-size: min(var(–fw), var(–fh));
cursor: default;
}
#now-corner .time-display:hover { opacity: 1; }
#now-corner .time-display::after { display: none; }
#now-corner .label { text-align: center; }
</style>

</head>
<body>

<div class="blob blob-green"></div>
<div class="blob blob-red"></div>
<div class="blob blob-yellow"></div>
<div class="h-line"></div>
<div class="v-line"></div>

<div class="corner" id="start-corner">
  <div class="label">Start</div>
  <span class="time-display" id="start-display" title="Tap to edit">09:00</span>
</div>

<div class="corner" id="end-corner">
  <div class="label">End</div>
  <span class="time-display" id="end-display" title="Tap to edit">17:00</span>
</div>

<div class="corner" id="now-corner">
  <div class="label">Now</div>
  <span class="time-display" id="now-display">00:00:00</span>
</div>

<script>
  function makeEditable(displayEl) {
    displayEl.addEventListener('click', () => {
      const current = displayEl.textContent.trim();
      const input = document.createElement('input');
      input.type = 'time';
      input.className = 'time-input';
      input.value = current;
      displayEl.replaceWith(input);
      input.focus();

      function commit() {
        const val = input.value || current;
        const [h, m] = val.split(':');
        displayEl.textContent = `${h.padStart(2,'0')}:${m.padStart(2,'0')}`;
        input.replaceWith(displayEl);
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { displayEl.textContent = current; input.replaceWith(displayEl); }
      });
    });
  }

  makeEditable(document.getElementById('start-display'));
  makeEditable(document.getElementById('end-display'));

  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('now-display').textContent = `${h}:${m}:${s}`;
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
