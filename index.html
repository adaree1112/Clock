<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }

body {
background: #0a0a0a;
overflow: hidden;
font-family: ‘Bebas Neue’, sans-serif;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
background-size: 60px 60px;
pointer-events: none;
z-index: 0;
}

.h-line {
position: fixed; left: 0; right: 0; top: 50%;
height: 1px; background: rgba(255,255,255,0.07); z-index: 1;
}
.v-line {
position: fixed; top: 0; bottom: 50%; left: 50%;
width: 1px; background: rgba(255,255,255,0.07); z-index: 1;
}

.blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.07; pointer-events: none; z-index: 0; }
.blob-green  { width: 40vw; height: 40vw; background: #39e86e; top: -10vw; left: -10vw; }
.blob-red    { width: 40vw; height: 40vw; background: #e83939; top: -10vw; right: -10vw; }
.blob-yellow { width: 60vw; height: 30vw; background: #f0d000; bottom: -5vw; left: 50%; transform: translateX(-50%); }

.corner {
position: fixed;
z-index: 2;
overflow: hidden;
display: flex;
flex-direction: column;
justify-content: flex-end; /* anchor to bottom of quadrant */
}

#start-corner {
top: 0; left: 0; width: 50%; height: 50%;
color: #39e86e;
text-shadow: 0 0 40px rgba(57,232,110,0.35);
align-items: flex-start;
padding: 0 3vmin 3vmin 3vmin;
}
#end-corner {
top: 0; right: 0; width: 50%; height: 50%;
color: #e83939;
text-shadow: 0 0 40px rgba(232,57,57,0.35);
align-items: flex-end;
padding: 0 3vmin 3vmin 3vmin;
}
#now-corner {
bottom: 0; left: 0; width: 100%; height: 50%;
color: #f0d000;
text-shadow: 0 0 40px rgba(240,208,0,0.35);
align-items: center;
justify-content: center;
padding: 3vmin;
}

.label {
font-family: ‘Bebas Neue’, sans-serif;
letter-spacing: 0.3em;
text-transform: uppercase;
opacity: 0.55;
line-height: 1;
margin-bottom: 0.1em;
flex-shrink: 0;
}

.time-display {
font-family: ‘Share Tech Mono’, monospace;
line-height: 1;
cursor: pointer;
transition: opacity 0.15s;
white-space: nowrap;
display: block;
flex-shrink: 0;
}
#end-display   { text-align: right; }
#now-display   { text-align: center; cursor: default; }

.time-display:hover   { opacity: 0.75; }
#now-display:hover    { opacity: 1; }

.time-input {
font-family: ‘Share Tech Mono’, monospace;
line-height: 1;
background: transparent;
border: none;
border-bottom: 0.05em solid currentColor;
outline: none;
padding: 0;
caret-color: currentColor;
color: inherit;
display: block;
width: 100%;
}
#end-corner .time-input { text-align: right; }
</style>

</head>
<body>

<div class="blob blob-green"></div>
<div class="blob blob-red"></div>
<div class="blob blob-yellow"></div>
<div class="h-line"></div>
<div class="v-line"></div>

<div class="corner" id="start-corner">
  <div class="label" id="start-label">Start</div>
  <span class="time-display" id="start-display" title="Tap to edit">09:00</span>
</div>

<div class="corner" id="end-corner">
  <div class="label" id="end-label">End</div>
  <span class="time-display" id="end-display" title="Tap to edit">17:00</span>
</div>

<div class="corner" id="now-corner">
  <div class="label" id="now-label">Now</div>
  <span class="time-display" id="now-display">00:00:00</span>
</div>

<script>
  // Binary-search the largest font size where el fits within maxW x maxH
  function fitText(el, maxW, maxH) {
    let lo = 4, hi = 2000;
    el.style.fontSize = hi + 'px';
    while (hi - lo > 0.5) {
      const mid = (lo + hi) / 2;
      el.style.fontSize = mid + 'px';
      if (el.scrollWidth <= maxW && el.scrollHeight <= maxH) lo = mid;
      else hi = mid;
    }
    el.style.fontSize = lo + 'px';
    return lo*0.9;
  }

  function resize() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const PAD = Math.min(W, H) * 0.03;

    // Quadrant inner dimensions
    const halfW = W / 2 - PAD * 2;
    const halfH = H / 2 - PAD;   // only bottom padding (top has no pad)

    // 1. Fit the TIME to fill the quadrant width, capped at ~80% of quadrant height
    const startSize = fitText(document.getElementById('start-display'), halfW, halfH * 0.82);
    const endSize   = fitText(document.getElementById('end-display'),   halfW, halfH * 0.82);

    // 2. Label is 25% of the time font size
    document.getElementById('start-label').style.fontSize = (startSize * 0.25) + 'px';
    document.getElementById('end-label').style.fontSize   = (endSize   * 0.25) + 'px';

    // NOW — full width, bottom half
    const fullW = W - PAD * 2;
    const nowH  = H / 2 - PAD * 2;
    const nowSize = fitText(document.getElementById('now-display'), fullW, nowH * 0.82);
    document.getElementById('now-label').style.fontSize = (nowSize * 0.25) + 'px';
  }

  document.fonts.ready.then(() => {
    resize();
    window.addEventListener('resize', resize);
  });

  function makeEditable(displayEl) {
    displayEl.addEventListener('click', () => {
      const current = displayEl.textContent.trim();
      const fs = displayEl.style.fontSize;
      const input = document.createElement('input');
      input.type = 'time';
      input.className = 'time-input';
      input.style.fontSize = fs;
      input.value = current;
      displayEl.replaceWith(input);
      input.focus();

      function commit() {
        const val = input.value || current;
        const [h, m] = val.split(':');
        displayEl.textContent = `${h.padStart(2,'0')}:${m.padStart(2,'0')}`;
        input.replaceWith(displayEl);
        resize();
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { displayEl.textContent = current; input.replaceWith(displayEl); }
      });
    });
  }

  makeEditable(document.getElementById('start-display'));
  makeEditable(document.getElementById('end-display'));

  function tick() {
    const now = new Date();
    document.getElementById('now-display').textContent =
      [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
